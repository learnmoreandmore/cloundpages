name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - cursor/kof-prototype-99f8
    paths:
      - 'apps/web-vue/**'
      - '.github/workflows/build-windows-exe.yml'

jobs:
  build-win-exe:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/web-vue

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web-vue/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run desktop:build:win

      - name: Upload EXE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: king-of-canvas-win-exe
          path: |
            apps/web-vue/release/*.exe
            apps/web-vue/release/*.blockmap
            apps/web-vue/release/latest*.yml
            apps/web-vue/release/win-unpacked/**
          if-no-files-found: error
          retention-days: 14
